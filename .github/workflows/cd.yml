name: CD (Next Release)

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  job1:
    name: fetch tag, update Cargo.toml, generate changelog, and open PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get tag
        id: tag
        uses: dawidd6/action-get-tag@v1
        with:
          strip_v: true

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: .config/cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Update version in Cargo.toml
        uses: colathro/toml-editor@1.1.1
        with:
          file: Cargo.toml
          key: package.version
          value: ${{ steps.tag.outputs.tag }}

      - name: Update README dependency snippets (all occurrences)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.tag }}"

          if [ -f README.md ]; then
            # Update any occurrences of:
            #   kiomq = "0.1"
            #   kiomq="0.1.2"
            #   kiomq = "0.1.2-alpha.1"
            #
            # Notes:
            # - Matches semantic-ish versions inside quotes.
            # - Rewrites to: kiomq = "<tag version>" (normalized spacing).
            sed -i -E 's/(^|[^A-Za-z0-9_])kiomq[[:space:]]*=[[:space:]]*"[^"]*"/\1kiomq = "'"${VERSION}"'"/g' README.md
          fi

      - name: Commit changes (open PR)
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(release): ${{ steps.tag.outputs.tag }}"
          title: "chore(release): ${{ steps.tag.outputs.tag }}"
          body: |
            Update version to ${{ steps.tag.outputs.tag }}, update README dependency snippet(s), and regenerate CHANGELOG.md.

            Triggered by tag: ${{ github.ref_name }}
          branch: update-release-${{ steps.tag.outputs.tag }}
          base: main
          signoff: true
          draft: false

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

  job3:
    needs: job1
    name: Create GitHub Release (from tag)
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ needs.job1.outputs.tag }}

    steps:
      - name: Checkout (full history for git-cliff)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch all tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags

      - name: Get tag (strip v)
        id: tag
        uses: dawidd6/action-get-tag@v1
        with:
          strip_v: true

      - name: Get current date (UTC)
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate release notes for this tag
        uses: orhun/git-cliff-action@v4
        with:
          config: .config/cliff-release.toml
          args: --verbose --latest
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.tag.outputs.tag }} ${{ steps.date.outputs.date }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}

  job2:
    needs: job3
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v3
        with:
          ref: update-release-${{ needs.job3.outputs.tag }}

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install native dependencies for RocksDB (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm pkg-config cmake make g++ \
            librocksdb-dev \
            libsnappy-dev zlib1g-dev libbz2-dev liblz4-dev libzstd-dev

      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          args: --allow-dirty
