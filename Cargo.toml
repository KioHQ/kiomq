[package]
name = "kio-mq"
version = "0.1.0"
edition = "2021"

[dependencies]
async-backtrace = "0.2.7"
chrono = { version = "0.4.41", features = ["serde"] }
dashmap = "6.1.0"
deadpool-redis = { version = "0.22.0", default-features = false, features = [
  "serde",
  "rt_tokio_1",
] }
derive_more = { version = "2.0.1", features = [
  "display",
  "from",
  "debug",
  "from_str",
] }
dotenv = "0.15.0"
futures = "0.3.31"
redis = { version = "0.32.3", features = ["tokio-comp", "streams", "json"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = { version = "1.0.140", features = ["default", "raw_value"] }
thiserror = "2.0.12"
tokio = { version = "1.46.1", features = ["macros", "rt", "rt-multi-thread"] }
tokio-util = "0.7.15"
typed-emitter = { git = "https://github.com/spencerjibz/typed-emitter.git", rev = "ef162996c1d1bb2085c01040c7f94cc30075ab83" }
uuid = { version = "1.17.0", features = ["serde", "v4"] }
[dev-dependencies]
ffmpeg-sidecar = { version = "*" }
