[package]
name = "kio-mq"
version = "0.1.0"
edition = "2021"
[package.metadata.cargo-commands]
exclude-examples = true
[dependencies]
async-backtrace = "0.2.7"
async-trait = "0.1.89"
atomig = { version = "0.4.3", features = ["derive", "serde"] }
chrono = { version = "0.4.41", features = ["serde"] }
croner = { version = "3.0.0", features = ["serde"] }
crossbeam-queue = "0.3.12"
crossbeam-skiplist = "0.1.3"
deadpool-redis = { version = "0.22.0", default-features = false, features = [
  "serde",
  "rt_tokio_1",
] }
derive_more = { version = "2.0.1", features = [
  "display",
  "from",
  "debug",
  "from_str",
  "is_variant",
] }
dotenv = "0.15.0"
futures = { version = "0.3.31", features = ["executor"] }
num_cpus = "1.17.0"
redis = { version = "0.32.3", features = ["tokio-comp", "streams", "json"] }
serde = { version = "1.0.219", features = ["derive"] }
simd-json = { version = "*", features = ["serde", "known-key"] }
rocksdb = { version = "*", default-features = false, features = [
  "snappy",
  "multi-threaded-cf",
], optional = true }
thiserror = "2.0.12"
tokio = { version = "1.46.1", features = [
  "macros",
  "rt",
  "rt-multi-thread",
  "fs",
  "tracing",
] }
tokio-util = "0.7.15"
typed-emitter = { git = "https://github.com/spencerjibz/typed-emitter.git", rev = "eafde7a6223f2acd63cc438ef6f3cbf300b3ce59" }
uuid = { version = "1.18.1", features = ["serde", "v4"] }
tempfile = "3.23.0"
timed-map = "1.5.0"
[dev-dependencies]
tracing-subscriber = "0.3.20"
ffmpeg-sidecar = { version = "*", features = ["download_ffmpeg"] }
rand = "*"
[dev-dependencies.console-subscriber]
version = "0.5"
features = ["env-filter"]
[features]
rocksdb-store = ["dep:rocksdb"]
